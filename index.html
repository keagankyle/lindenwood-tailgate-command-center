<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Lindenwood Tailgate Command Center</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; position: relative; }
    #sidebar {
      position: absolute; top: 10px; right: 10px; width: 250px;
      background: rgba(255, 255, 255, 0.9); padding: 15px;
      border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
      z-index: 99; font-family: sans-serif;
    }
    .lu-gold { color: #af935a; font-weight: bold; }
    button { width: 100%; margin-top: 5px; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    button:hover { background-color: #f0f0f0; }
    #arcgisEmbed { position: absolute; top: 0; left: 0; z-index: 5; display: none; }
  </style>
</head>
<body>
  <div id="introModal" style="position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; max-width:500px; text-align:center; font-family:sans-serif;">
      <h1 class="lu-gold">2026 Tailgate Proposals</h1>
      <p>Explore the proposed layouts using the sidebar buttons.</p>
      <button onclick="document.getElementById('introModal').style.display='none'" style="background:#af935a; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">View Proposals</button>
    </div>
  </div>

  <div id="sidebar">
    <h2 class="lu-gold">2026 Tailgate Center</h2>
    <div id="layerToggle">
      <button id="primaryBtn">Improved Layout</button>
      <button id="heritageBtn">Heritage Side</button>
      <button id="harmonBtn">Harmon Lot</button>
    </div>
  </div> 

  <div id="viewDiv">
    <iframe id="arcgisEmbed" width="100%" height="100%" frameborder="0" src="https://www.arcgis.com/apps/mapviewer/index.html?webmap=061264c9869542df984534720978939b"></iframe>
  </div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/Legend"
    ], function(Map, MapView, GeoJSONLayer, Legend) {

      const tailgateTemplate = {
        title: "{Lot_Name}",
        content: [{
          type: "fields",
          fieldInfos: [
            { fieldName: "Lot_Name", label: "Lot Name" },
            { fieldName: "Parking_Type", label: "Type" },
            { fieldName: "Opening_Time", label: "Opens" }
          ]
        }]
      };

      // --- LAYERS ---
      // Primary JS Layer (Used as fallback for Improved)
      const tailgateLayer = new GeoJSONLayer({
        url: "./data/Lindenwood_Tailgate_2026.geojson",
        title: "Default Layout",
        popupTemplate: tailgateTemplate,
        visible: false
      });

      // Heritage Layers
      const heritageUrl = "./data/Lindenwood_University_Tailgate_2026_(Heritage_Side).geojson";
      const hParking = new GeoJSONLayer({ url: heritageUrl, title: "Heritage Parking", visible: false, popupTemplate: tailgateTemplate });
      const hTailgate = new GeoJSONLayer({ url: heritageUrl, title: "Heritage Tailgate", visible: false, popupTemplate: tailgateTemplate });

      // Harmon Layers
      const harmonUrl = "./data/Lindenwood_University_Tailgate_2026_(Harmon_Lot).geojson";
      const harmonParking = new GeoJSONLayer({ url: harmonUrl, title: "Harmon Parking", visible: false, popupTemplate: tailgateTemplate });
      const harmonTailgate = new GeoJSONLayer({ url: harmonUrl, title: "Harmon Tailgate", visible: false, popupTemplate: tailgateTemplate });

      const map = new Map({
        basemap: "topo-vector",
        layers: [tailgateLayer, hParking, hTailgate, harmonParking, harmonTailgate]
      });

      const view = new MapView({
        container: "viewDiv",
        center: [-90.503, 38.786],
        zoom: 16,
        map: map
      });

      view.when(() => {
        const legend = new Legend({ view: view });
        view.ui.add(legend, "bottom-left");

        function switchProposal(activeLayers, isImproved = false) {
          const allLayers = [tailgateLayer, hParking, hTailgate, harmonParking, harmonTailgate];
          const embedFrame = document.getElementById("arcgisEmbed");
          const jsMapCanvas = document.querySelector(".esri-view-root");

          if (isImproved) {
            embedFrame.style.display = "block";
            if (jsMapCanvas) jsMapCanvas.style.display = "none";
            legend.container.style.display = "none"; // Hide JS legend for embed
            allLayers.forEach(l => l.visible = false);
          } else {
            embedFrame.style.display = "none";
            if (jsMapCanvas) jsMapCanvas.style.display = "block";
            legend.container.style.display = "block";
            
            allLayers.forEach(layer => {
              layer.visible = activeLayers.includes(layer);
            });

            // Update Legend labels
            legend.layerInfos = activeLayers.map(l => ({ layer: l, title: l.title }));
          }
        }

        // Button Click Handlers
        document.getElementById("primaryBtn").onclick = () => switchProposal([], true);
        document.getElementById("heritageBtn").onclick = () => switchProposal([hParking, hTailgate], false);
        document.getElementById("harmonBtn").onclick = () => switchProposal([harmonParking, harmonTailgate], false);
        
        // Default to showing the Improved Embed
        switchProposal([], true);
      });
    });
  </script>
</body>
</html>
