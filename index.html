<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Lindenwood Tailgate Command Center</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; }
    #sidebar {
      position: absolute; top: 10px; right: 10px; width: 250px;
      background: rgba(255, 255, 255, 0.9); padding: 15px;
      border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
      z-index: 99; font-family: sans-serif;
    }
    .lu-gold { color: #af935a; font-weight: bold; }
    button { width: 100%; margin-top: 5px; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    button:hover { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <div id="introModal" style="position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; max-width:500px; text-align:center; font-family:sans-serif;">
      <h1 class="lu-gold">2026 Tailgate Proposals</h1>
      <p>Explore the proposed layouts using the sidebar buttons.</p>
      <button onclick="document.getElementById('introModal').style.display='none'" style="background:#af935a; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">View Proposals</button>
    </div>
  </div>

  <div id="sidebar">
    <h2 class="lu-gold">2026 Tailgate Center</h2>
    <div id="layerToggle">
      <button id="primaryBtn">Improved Layout</button>
      <button id="heritageBtn">Heritage Side</button>
      <button id="harmonBtn">Harmon Lot</button>
    </div>
  </div> 
  <div id="viewDiv"></div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/Legend"
    ], function(Map, MapView, GeoJSONLayer, Legend) {

      // Reusable Template for all layers
      const tailgateTemplate = {
        title: "{Lot_Name}",
        content: [{
          type: "fields",
          fieldInfos: [
            { fieldName: "Lot_Name", label: "Lot Name" },
            { fieldName: "Parking_Type", label: "Type" },
            { fieldName: "Opening_Time", label: "Opens" },
            { fieldName: "Permit_Required", label: "Permit Required?" }
          ]
        }]
      };

      // --- RENDERERS (simplified for functionality) ---
      const genericRenderer = {
        type: "simple",
        symbol: { type: "simple-fill", color: [175, 147, 90, 0.6], outline: { color: "white", width: 1 } }
      };

      // --- LAYERS ---
      // Improved Layout
      const tailgateLayer = new GeoJSONLayer({
        url: "./data/Lindenwood_Tailgate_2026.geojson",
        popupTemplate: tailgateTemplate,
        title: "Parking & Tailgate Lots",
        visible: true
      });
      const specializedLayer = new GeoJSONLayer({
        url: "./data/Lindenwood_Tailgate_2026.geojson",
        popupTemplate: tailgateTemplate,
        visible: true,
        title: "Specialized Zones"
      });

      // Heritage Layers
      const heritageUrl = "./data/Lindenwood_University_Tailgate_2026_(Heritage_Side).geojson";
      const hParking = new GeoJSONLayer({ 
        url: heritageUrl, title: "Heritage Parking", visible: false, popupTemplate: tailgateTemplate 
      });
      const hTailgate = new GeoJSONLayer({ 
        url: heritageUrl, title: "Heritage Tailgate", visible: false, popupTemplate: tailgateTemplate 
      });

      // Harmon Layers
      const harmonUrl = "./data/Lindenwood_University_Tailgate_2026_(Harmon_Lot).geojson";
      const harmonParking = new GeoJSONLayer({ 
        url: harmonUrl, title: "Harmon Parking", visible: false, popupTemplate: tailgateTemplate 
      });
      const harmonTailgate = new GeoJSONLayer({ 
        url: harmonUrl, title: "Harmon Tailgate", visible: false, popupTemplate: tailgateTemplate 
      });

      const map = new Map({
        basemap: "topo-vector",
        layers: [tailgateLayer, specializedLayer, hParking, hTailgate, harmonParking, harmonTailgate]
      });

      const view = new MapView({
        container: "viewDiv",
        center: [-90.503, 38.786],
        zoom: 16,
        map: map
      });

      view.when(() => {
        // Initialize Legend
        const legend = new Legend({ view: view });
        view.ui.add(legend, "bottom-left");

        // Function to toggle layers AND update the Legend display
        function switchProposal(activeLayers) {
          const allLayers = [tailgateLayer, specializedLayer, hParking, hTailgate, harmonParking, harmonTailgate];
          
          allLayers.forEach(layer => {
            layer.visible = activeLayers.includes(layer);
          });

          // Force legend to refresh and show only visible layers
          legend.layerInfos = activeLayers.map(layer => {
            return { layer: layer, title: layer.title };
          });
        }

        // Button Assignments
        document.getElementById("primaryBtn").onclick = () => switchProposal([tailgateLayer, specializedLayer]);
        document.getElementById("heritageBtn").onclick = () => switchProposal([hParking, hTailgate]);
        document.getElementById("harmonBtn").onclick = () => switchProposal([harmonParking, harmonTailgate]);
        
        // Default legend state
        switchProposal([tailgateLayer, specializedLayer]);
      });
    });
  </script>
</body>
</html>
