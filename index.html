<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Lindenwood Tailgate Command Center</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.28/"></script>
  <style>
    html, body, #viewDiv { padding: 0; margin: 0; height: 100%; width: 100%; }
    #sidebar {
      position: absolute; top: 10px; right: 10px; width: 250px;
      background: rgba(255, 255, 255, 0.9); padding: 15px;
      border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
      z-index: 99; font-family: sans-serif;
    }
    .lu-gold { color: #af935a; font-weight: bold; }
    button { width: 100%; margin-top: 5px; padding: 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    button:hover { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <div id="introModal" style="position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; max-width:500px; text-align:center; font-family:sans-serif;">
      <h1 class="lu-gold">2026 Tailgate Proposals</h1>
      <p>Explore the proposed layouts using the sidebar buttons.</p>
      <button onclick="document.getElementById('introModal').style.display='none'" style="background:#af935a; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">View Proposals</button>
    </div>
  </div>

  <div id="sidebar">
    <h2 class="lu-gold">2026 Tailgate Center</h2>
    <div id="layerToggle">
      <button id="primaryBtn">Improved Layout</button>
      <button id="heritageBtn">Heritage Side</button>
      <button id="harmonBtn">Harmon Lot</button>
    </div>
  </div> 
<div id="viewDiv">
    <iframe id="arcgisEmbed" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            scrolling="no" 
            marginheight="0" 
            marginwidth="0" 
            src="https://www.arcgis.com/apps/mapviewer/index.html?webmap=061264c9869542df984534720978939b"
            style="display: none; border: none;">
    </iframe>
</div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/GeoJSONLayer",
      "esri/widgets/Legend"
    ], function(Map, MapView, GeoJSONLayer, Legend) {

      const heritageUrl = "./data/Lindenwood_University_Tailgate_2026_(Heritage_Side).geojson";

      // --- RENDERERS ---

      // Improved Layout Renderers
      const lotRenderer = {
        type: "unique-value",
        field: "Lot_Name",
        uniqueValueInfos: [
          { value: "Lot A", symbol: { type: "simple-fill", color: "#af935a" }, label: "Lot A" },
          { value: "Lot B", symbol: { type: "simple-fill", color: "#228b22" }, label: "Lot B" },
          { value: "Lot C", symbol: { type: "simple-fill", color: "#006400" }, label: "Lot C" }
        ]
      };

      // Heritage Side Renderers
      const heritageLotRenderer = {
        type: "unique-value",
        field: "Lot_Name",
        uniqueValueInfos: [
          { value: "Heritage Lot", symbol: { type: "simple-fill", color: "#af935a" }, label: "Heritage Main" },
          { value: "Visitor Lot", symbol: { type: "simple-fill", color: "#1e64c8" }, label: "Visitor Parking" }
        ]
      };

      const zoneTypeRenderer = {
        type: "unique-value",
        field: "Zone_Type",
        uniqueValueInfos: [
          { value: "VIP", symbol: { type: "simple-fill", color: "#006400" }, label: "VIP Zone" },
          { value: "Student", symbol: { type: "simple-fill", color: "#228b22" }, label: "Student Zone" }
        ]
      };

      // --- LAYERS ---

      // Primary Layers
      const tailgateLayer = new GeoJSONLayer({
        url: "./data/Lindenwood_Tailgate_2026.geojson",
        renderer: lotRenderer,
        title: "Parking & Tailgate Lots",
        visible: true
      });

      // Heritage Layers (Broken into 4 as requested)
      const heritageParking = new GeoJSONLayer({
        url: heritageUrl,
        title: "Parking Lots",
        renderer: heritageLotRenderer,
        definitionExpression: "Lot_Name IS NOT NULL AND Zone_Type IS NULL", 
        visible: false
      });

      const heritageTailgate = new GeoJSONLayer({
        url: heritageUrl,
        title: "Tailgating Zones",
        renderer: zoneTypeRenderer,
        definitionExpression: "Zone_Type LIKE '%Tailgate%'",
        visible: false
      });

      const heritageSpecialized = new GeoJSONLayer({
        url: heritageUrl,
        title: "Specialized Zones",
        renderer: zoneTypeRenderer,
        definitionExpression: "Zone_Type NOT LIKE '%Tailgate%' AND Zone_Type IS NOT NULL",
        visible: false
      });

      const heritageRestricted = new GeoJSONLayer({
        url: heritageUrl,
        title: "Restricted Lots",
        renderer: heritageLotRenderer,
        definitionExpression: "Lot_Name LIKE '%Restricted%'",
        visible: false
      });

      const harmonLayer = new GeoJSONLayer({
        url: "./data/Lindenwood_University_Tailgate_2026_(Harmon_Lot).geojson",
        title: "Harmon Lot",
        visible: false
      });

      const map = new Map({
        basemap: "topo-vector",
        layers: [tailgateLayer, heritageParking, heritageTailgate, heritageSpecialized, heritageRestricted, harmonLayer]
      });

      const view = new MapView({
        container: "viewDiv",
        center: [-90.503, 38.786],
        zoom: 16,
        map: map
      });

      view.when(() => {
        const legend = new Legend({ view: view });
        view.ui.add(legend, "bottom-left");

        // Set initial legend
        legend.layerInfos = [{ layer: tailgateLayer, title: "Improved Layout" }];

        function switchProposal(activeLayers, isImproved = false) {
  const allLayers = [tailgateLayer, specializedLayer, hParking, hTailgate, harmonParking, harmonTailgate];
  const embedFrame = document.getElementById("arcgisEmbed");
  const jsMapCanvas = document.querySelector(".esri-view-surface"); // The JS Map surface

  if (isImproved) {
    // Show the External Web Map Embed
    embedFrame.style.display = "block";
    if (jsMapCanvas) jsMapCanvas.style.display = "none";
    
    // Hide all JS layers
    allLayers.forEach(layer => layer.visible = false);
  } else {
    // Show the Manual JS Map
    embedFrame.style.display = "none";
    if (jsMapCanvas) jsMapCanvas.style.display = "block";

    // Toggle JS layers based on selection
    allLayers.forEach(layer => {
      layer.visible = activeLayers.includes(layer);
    });
  }
}

// Update your button clicks
document.getElementById("primaryBtn").onclick = () => switchProposal([], true);
document.getElementById("heritageBtn").onclick = () => switchProposal([hParking, hTailgate], false);
document.getElementById("harmonBtn").onclick = () => switchProposal([harmonParking, harmonTailgate], false);
  </script>
</body>
</html>
